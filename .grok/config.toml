[models]
default = "grok-build"          # コーディング用おすすめ
web_search = "grok-4.5"         # 検索用

[ui]
permission_mode = "auto"        # バランス良い設定

[session]
auto_compact_threshold_percent = 85

[tools]
respect_gitignore = true        # .gitignoreを尊重（推奨）

[sandbox]
profile = "workspace"           # または "off"。安全性を高めたい場合

[permission]
rules = [
  # ========== Git ==========
  { action = "allow", tool = "bash", pattern = "git *" },
  { action = "deny",  tool = "bash", pattern = "git push *" },
  { action = "deny",  tool = "bash", pattern = "git reset --hard *" },
  { action = "deny",  tool = "bash", pattern = "git clean *" },
  { action = "deny",  tool = "bash", pattern = "git checkout -- *" },
  { action = "deny",  tool = "bash", pattern = "git restore *" },

  # よく使う安全なGitサブコマンド（念のため明示）
  { action = "allow", tool = "bash", pattern = "git status *" },
  { action = "allow", tool = "bash", pattern = "git diff *" },
  { action = "allow", tool = "bash", pattern = "git log *" },
  { action = "allow", tool = "bash", pattern = "git branch *" },
  { action = "allow", tool = "bash", pattern = "git show *" },

  # ========== 特定シェルスクリプト ==========
  { action = "allow", tool = "bash", pattern = "./scripts/run-e2e.sh *" },
  { action = "allow", tool = "bash", pattern = "./scripts/generate-local-secrets.sh *" },
  { action = "allow", tool = "bash", pattern = "bash ./scripts/run-e2e.sh *" },
  { action = "allow", tool = "bash", pattern = "bash ./scripts/generate-local-secrets.sh *" },

  
  { action = "allow", tool = "bash", pattern = "rmdir .run-e2e.lock 2>/dev/null" },

  # ========== 読み取り系 ==========
  { action = "allow", tool = "read" },
  { action = "allow", tool = "grep" },
  { action = "allow", tool = "bash", pattern = "tee *" },
  { action = "allow", tool = "bash", pattern = "tail *" },
  { action = "allow", tool = "bash", pattern = "cat *" },
  { action = "allow", tool = "bash", pattern = "ls *" },

  # ========== Docker Compose ==========
  { action = "allow", tool = "bash", pattern = "docker compose *" },
  { action = "allow", tool = "bash", pattern = "docker-compose *" },

  # 危険なDocker操作
  { action = "deny",  tool = "bash", pattern = "docker compose down -v *" },
  { action = "deny",  tool = "bash", pattern = "docker system prune *" },

  # ========== 危険なシェルコマンド ==========
  { action = "deny",  tool = "bash", pattern = "rm -rf *" },
  { action = "deny",  tool = "bash", pattern = "rm -r *" },
  { action = "deny",  tool = "bash", pattern = "chmod *" },
  { action = "deny",  tool = "bash", pattern = "chown *" },
  { action = "deny",  tool = "bash", pattern = "sudo *" },
]