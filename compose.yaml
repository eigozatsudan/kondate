name: "${KONDATE_COMPOSE_PROJECT_NAME:?KONDATE_COMPOSE_PROJECT_NAME is required}"

include:
  - path:
      - ./infra/supabase/docker-compose.yml
      - ./infra/supabase.override.yaml
    env_file: ./.env

services:
  kong:
    ports: !override
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8443:8443"

  supavisor:
    ports: !override
      - "127.0.0.1:5432:5432"
      - "127.0.0.1:6543:6543"

  mailpit:
    image: axllent/mailpit:v1.27
    restart: unless-stopped
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 2s
      timeout: 2s
      retries: 30

  openrouter-mock:
    image: node:24-bookworm-slim
    command: ["node", "/app/server.mjs"]
    volumes:
      - ./tools/openrouter-mock/server.mjs:/app/server.mjs:ro
      - ./tools/openrouter-mock/fixtures:/app/fixtures:ro
    ports:
      - "127.0.0.1:8787:8787"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 2s
      timeout: 2s
      retries: 30

  oauth-mock:
    image: node:24-bookworm-slim
    command: ["node", "/app/server.mjs"]
    depends_on:
      auth:
        condition: service_healthy
    environment:
      SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      OAUTH_MOCK_USER_PASSWORD: ${OAUTH_MOCK_USER_PASSWORD}
    volumes:
      - ./tools/oauth-mock/server.mjs:/app/server.mjs:ro
      - ./tools/oauth-mock/fixtures:/app/fixtures:ro
    ports:
      - "127.0.0.1:8788:8788"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8788/health').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 2s
      timeout: 2s
      retries: 30

  migrate:
    image: supabase/postgres:17.6.1.136
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    entrypoint: ["/workspace/scripts/apply-migrations.sh"]
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
    volumes:
      - .:/workspace:ro
    restart: "no"

  db-test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile.db-test
    depends_on:
      migrate:
        condition: service_completed_successfully
    entrypoint: ["/workspace/scripts/run-pgtap.sh"]
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
    volumes:
      - .:/workspace:ro
    restart: "no"

  app:
    build:
      context: .
      target: development
    depends_on:
      migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
      openrouter-mock:
        condition: service_healthy
      oauth-mock:
        condition: service_healthy
      meta:
        condition: service_healthy
    environment:
      # コンテナ内では localhost が ::1 を先に返すため、@netlify/functions-dev の
      # streaming bridge が ::1 にbindし 127.0.0.1 へ接続して ECONNREFUSED になる。
      # IPv4を優先させ、dev中のFunction呼び出しを成立させる。
      NODE_OPTIONS: --dns-result-order=ipv4first
      VITE_SUPABASE_URL: http://127.0.0.1:8000
      VITE_SUPABASE_PUBLISHABLE_KEY: ${ANON_KEY}
      VITE_MAGIC_LINK_RESEND_SECONDS: ${VITE_MAGIC_LINK_RESEND_SECONDS:-60}
      VITE_AUTH_CONTINUATION_TTL_MS: ${VITE_AUTH_CONTINUATION_TTL_MS:-300000}
      VITE_AUTH_PROVIDER_MODE: ${VITE_AUTH_PROVIDER_MODE:-oauth_mock}
      VITE_OAUTH_MOCK_ORIGIN: ${VITE_OAUTH_MOCK_ORIGIN:-http://127.0.0.1:8788}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLISHABLE_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SERVER_SITE_ORIGIN: ${SERVER_SITE_ORIGIN:-http://127.0.0.1:5173}
      AUTH_CONTINUATION_ENCRYPTION_KEY: ${AUTH_CONTINUATION_ENCRYPTION_KEY}
      AUTH_CONTINUATION_TTL_SECONDS: ${AUTH_CONTINUATION_TTL_SECONDS:-300}
      GENERATION_REQUEST_HMAC_KEY: ${GENERATION_REQUEST_HMAC_KEY}
      OPENROUTER_API_KEY: local-mock-key
      OPENROUTER_MODELS: mock/kondate-primary:free,mock/kondate-repair:free
      OPENROUTER_BASE_URL: http://openrouter-mock:8787/api/v1
      USER_DAILY_AI_LIMIT: "5"
      USER_DAILY_EXTERNAL_CALL_LIMIT: "12"
      USER_SHORT_WINDOW_EXTERNAL_CALL_LIMIT: "4"
      USER_SHORT_WINDOW_SECONDS: "600"
      GLOBAL_DAILY_AI_LIMIT: "45"
      OPENROUTER_TIMEOUT_MS: "20000"
      FUNCTION_TOTAL_BUDGET_MS: "50000"
      AI_PROCESSING_STALE_SECONDS: "180"
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
    tmpfs:
      - /workspace/.netlify:uid=${LOCAL_UID:-1000},gid=${LOCAL_GID:-1000},mode=1777
      - /workspace/dist:uid=${LOCAL_UID:-1000},gid=${LOCAL_GID:-1000},mode=1777
    healthcheck:
      test:
        ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 2s
      timeout: 2s
      retries: 30

  e2e:
    profiles: ["e2e"]
    build:
      context: .
      target: e2e
    network_mode: host
    depends_on:
      app:
        condition: service_healthy
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
    entrypoint: ["npx", "playwright", "test"]

volumes:
  node_modules:
