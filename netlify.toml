[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "24"

[[redirects]]
  from = "/api/emergency-menus"
  to = "/.netlify/functions/emergency-menus"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
