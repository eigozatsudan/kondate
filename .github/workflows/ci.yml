name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Generate ephemeral local secrets
        run: ./scripts/generate-local-secrets.sh
      - name: Assert the canonical local continuation origin
        run: |
          set -a; . ./.env; set +a
          test "$SERVER_SITE_ORIGIN" = "http://127.0.0.1:5173"
          test "$VITE_AUTH_PROVIDER_MODE" = "oauth_mock"
          test "$VITE_OAUTH_MOCK_ORIGIN" = "http://127.0.0.1:8788"
      - run: docker compose config --quiet
      - run: docker compose up -d --wait
      - run: curl --fail --silent --show-error http://127.0.0.1:8788/health
      - name: Provision least-privilege maintenance login
        run: ./scripts/provision-maintenance-role.sh
      - name: Local-safe Node script unit tests
        run: >-
          docker compose run --rm --no-deps app node --test
          scripts/provision-maintenance-role.test.mjs
          scripts/preflight-production.test.mjs
          scripts/smoke-production.test.mjs
          scripts/verify-production-deploy.test.mjs
          scripts/verify-browser-secrets.test.mjs
      - run: docker compose run --rm --no-deps app npm run format:check
      - run: docker compose run --rm --no-deps app npm run lint
      - run: docker compose run --rm --no-deps app npm run typecheck
      - name: Maintenance unit tests
        run: >-
          docker compose run --rm --no-deps app npx vitest run
          netlify/functions/_shared/maintenance-env.test.ts
          netlify/functions/_shared/maintenance-db.test.ts
          netlify/functions/maintenance-cleanup.test.ts
      - run: docker compose run --rm --no-deps app npx vitest run
      - name: Maintenance DB integration
        run: docker compose run --rm app npm run test:maintenance-db:integration
      - run: docker compose --profile test run --rm db-test
      - name: Verify public and private generated database types
        run: |
          docker compose run --rm app npm run db:types
          git diff --exit-code -- src/shared/types/database.generated.ts
      - name: E2E with privacy log assertion
        env:
          LOCAL_MOCK_MODELS: mock/kondate-primary:free,mock/kondate-repair:free
          KONDATE_ASSERT_PRIVACY_LOGS: "1"
        run: ./scripts/run-e2e.sh
      - run: docker compose run --rm --no-deps app npm audit --omit=dev --audit-level=high
      - name: Browser build and secret scan
        run: docker compose run --rm --no-deps app sh -c 'npm run build && npm run verify:browser-secrets -- --require-dist'
      - run: docker compose run --rm --no-deps app npm exec --offline netlify -- build --offline --context deploy-preview
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
      - name: Show container health on failure
        if: failure()
        run: docker compose ps
      - name: Tear down and remove ephemeral secrets
        if: always()
        run: |
          docker compose down --volumes
          rm -f .env
